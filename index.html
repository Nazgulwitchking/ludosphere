<!DOCTYPE html>
<html lang="de" class="theme-neutral">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Ludosphere</title>

    <link rel="manifest"
          href="manifest.json">

    <meta name="theme-color"
          content="#4f78db" id="themeColorMeta">

    <meta name="mobile-web-app-capable"
          content="yes">

    <meta name="apple-mobile-web-app-capable"
          content="yes">

    <meta name="apple-mobile-web-app-status-bar-style"
          content="black-translucent">

    <meta name="apple-mobile-web-app-title"
          content="Ludosphere">

    <link rel="apple-touch-icon"
          href="assets/icons/icon-192.png">

    <link rel="stylesheet"
          type="text/css"
          href="css/core.css?v=1.0.16">

    <link rel="stylesheet"
          type="text/css"
          href="css/themes.css?v=1.0.0">

</head>

<body>

    <div id="backgroundLayer"
         class="background-layer"
         style="pointer-events: none;"></div>

    <div id="themeOverlay"
         style="pointer-events: none;"></div>

    <div id="effectsLayer"
         class="effects-layer"
         style="pointer-events: none;"></div>

    <div id="widgetLayer"
         class="widget-layer"
         style="pointer-events: none;"></div>


    <section id="landing-page"
             style="position: relative; z-index: 10;">

        <div class="landing-container">

            <h1 data-i18n="APP_TITLE"></h1>

            <p data-i18n="APP_DESCRIPTION"></p>

            <div class="landing-features">

                <div class="feature-card">

                    <span>🎉</span>

                    <p data-i18n="FEATURE_PARTY_GAMES"></p>

                </div>

                <div class="feature-card">

                    <span>👥</span>

                    <p data-i18n="FEATURE_GROUP_PLAY"></p>

                </div>

                <div class="feature-card">

                    <span>🌍</span>

                    <p data-i18n="FEATURE_MULTILANGUAGE"></p>

                </div>

            </div>

            <button id="installButton"
                    class="primary-btn"
                    data-i18n="INSTALL_ANDROID"
                    style="position: relative; z-index: 20; pointer-events: auto;">
            </button>

        </div>

    </section>


    <section id="onboarding"
             style="display:none;">

        <div class="popup-screen"
             id="welcome-step">

            <h2 data-i18n="WELCOME_TITLE"></h2>

            <p data-i18n="WELCOME_TEXT"></p>

            <div class="welcome-images">

                <div class="placeholder-image"></div>

                <div class="placeholder-image"></div>

                <div class="placeholder-image"></div>

            </div>

            <button class="primary-btn next-step"
                    data-i18n="CONTINUE">
            </button>

        </div>


        <div class="popup-screen"
             id="group-step"
             style="display:none;">

            <h2 data-i18n="PLAY_WITH_TITLE"></h2>

            <p data-i18n="PLAY_WITH_DESCRIPTION"></p>

            <div class="selection-grid">

                <button class="select-option"
                        data-value="friends">

                    <span data-i18n="OPTION_FRIENDS"></span>

                </button>

                <button class="select-option"
                        data-value="family">

                    <span data-i18n="OPTION_FAMILY"></span>

                </button>

                <button class="select-option"
                        data-value="school">

                    <span data-i18n="OPTION_SCHOOL"></span>

                </button>

                <button class="select-option"
                        data-value="couple">

                    <span data-i18n="OPTION_COUPLE"></span>

                </button>

                <button class="select-option"
                        data-value="party">

                    <span data-i18n="OPTION_PARTY"></span>

                </button>

                <button class="select-option"
                        data-value="mixed">

                    <span data-i18n="OPTION_MIXED"></span>

                </button>

            </div>

            <button class="primary-btn next-step"
                    data-i18n="CONTINUE">
            </button>

        </div>


        <div class="popup-screen"
             id="gender-step"
             style="display:none;">

            <h2 data-i18n="GENDER_TITLE"></h2>

            <div class="selection-grid">

                <button class="select-option"
                        data-value="male">

                    <span data-i18n="GENDER_MALE"></span>

                </button>

                <button class="select-option"
                        data-value="female">

                    <span data-i18n="GENDER_FEMALE"></span>

                </button>

                <button class="select-option"
                        data-value="other">

                    <span data-i18n="GENDER_OTHER"></span>

                </button>

                <button class="select-option"
                        data-value="skip">

                    <span data-i18n="SKIP"></span>

                </button>

            </div>

            <button class="primary-btn next-step"
                    data-i18n="CONTINUE">
            </button>

        </div>


        <div class="popup-screen"
             id="language-step"
             style="display:none;">

            <h2 data-i18n="LANGUAGE_TITLE"></h2>

            <p data-i18n="LANGUAGE_DESCRIPTION"></p>

            <div class="selection-grid">

                <button class="select-option" data-lang="de">Deutsch</button>
                <button class="select-option" data-lang="en">English</button>
                <button class="select-option" data-lang="es">Español</button>
                <button class="select-option" data-lang="fr">Français</button>
                <button class="select-option" data-lang="it">Italiano</button>
                <button class="select-option" data-lang="nl">Nederlands</button>
                <button class="select-option" data-lang="pl">Polski</button>
                <button class="select-option" data-lang="pt">Português</button>
                <button class="select-option" data-lang="ru">Русский</button>
                <button class="select-option" data-lang="tr">Türkçe</button>

            </div>

            <button id="finishOnboarding"
                    class="primary-btn"
                    data-i18n="FINISH">
            </button>

        </div>

    </section>


    <section id="app"
             style="display:none;">

        <header class="app-header">

            <div class="header-top">

                <h1 data-i18n="APP_NAME_SHORT"></h1>

                <button id="settingsBtn"
                        aria-label="Settings">

                    ⚙️

                </button>

            </div>

            <div class="search-container">

                <input type="text"
                       id="gameSearch"
                       name="gameSearch"
                       autocomplete="off"
                       spellcheck="false"
                       data-i18n-placeholder="SEARCH_GAMES">

            </div>

        </header>


        <main id="libraryPage"
              class="page active-page">

            <div id="gamesGrid">

            </div>

        </main>


        <main id="myGamesPage"
              class="page">

            <div class="widget-area">

            </div>

            <div id="myGamesGrid">

            </div>

        </main>


        <nav class="bottom-navigation">

            <button id="libraryTab"
                    class="nav-btn active"
                    data-i18n="TAB_LIBRARY">
            </button>

            <button id="myGamesTab"
                    class="nav-btn"
                    data-i18n="TAB_MY_GAMES">
            </button>

        </nav>

    </section>


    <div id="settingsOverlay" class="full-overlay hidden" style="background-color: #121214 !important; backdrop-filter: none !important;">
        <div class="overlay-header" style="display: flex; align-items: center; justify-content: space-between; position: relative;">
            <div style="width: 40px;"></div>
            <h2 class="overlay-title" data-i18n="SETTINGS_TITLE" style="font-size: 22px; font-weight: 700; text-align: center; margin: 0; flex-grow: 1;">Einstellungen</h2>
            <button id="closeSettingsBtn" class="overlay-close-btn" aria-label="Schließen" style="width: 40px; font-size: 24px;">&times;</button>
        </div>

        <div class="overlay-body">
            <div class="profile-avatar-container">
                <div class="profile-avatar-placeholder" style="background-color: #2c2c2e; border-radius: 50%; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
                    <svg viewBox="0 0 24 24" fill="#8e8e93" width="56" height="56">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
            </div>

            <div class="settings-menu-group">
                <button class="settings-menu-item disabled" style="background-color: #1c1c1e !important; border: 1px solid #2c2c2e !important; color: #ffffff !important;">
                    <div class="item-left">
                        <span class="item-icon">👤</span>
                        <span class="item-label" data-i18n="PROFILE_SETTINGS">Profil Einstellungen</span>
                    </div>
                    <span class="chevron">›</span>
                </button>

                <button id="linkAccountBtn" class="settings-menu-item" style="background-color: #1c1c1e !important; border: 1px solid #2c2c2e !important; color: #ffffff !important;">
                    <div class="item-left">
                        <span class="item-icon">🔗</span>
                        <span class="item-label" data-i18n="LINK_ACCOUNT">Konto verknüpfen</span>
                    </div>
                    <div class="item-right">
                        <span id="accountStatusText" class="current-badge">Nicht verknüpft</span>
                        <span class="chevron">›</span>
                    </div>
                </button>

                <button id="languageOptionBtn" class="settings-menu-item" style="background-color: #1c1c1e !important; border: 1px solid #2c2c2e !important; color: #ffffff !important;">
                    <div class="item-left">
                        <span class="item-icon">🌐</span>
                        <span class="item-label" data-i18n="CHANGE_LANGUAGE">Sprache wechseln</span>
                    </div>
                    <div class="item-right">
                        <span id="currentLangLabel" class="current-badge">Deutsch</span>
                        <span class="chevron">›</span>
                    </div>
                </button>

                <button id="themeOptionBtn" class="settings-menu-item" style="background-color: #1c1c1e !important; border: 1px solid #2c2c2e !important; color: #ffffff !important;">
                    <div class="item-left">
                        <span class="item-icon">🎨</span>
                        <span class="item-label" data-i18n="APP_DESIGN">App Design</span>
                    </div>
                    <div class="item-right">
                        <span id="currentThemeBadge" class="current-badge" data-i18n="THEME_NEUTRAL">Standard (Neutral)</span>
                        <span class="chevron">›</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="accountOverlayModal" class="full-overlay hidden" style="background-color: #121214 !important; backdrop-filter: none !important;">
        <div class="overlay-header" style="display: flex; align-items: center; justify-content: space-between; position: relative; padding: 15px 20px;">
            <button id="backFromAccountBtn" class="overlay-back-btn" style="width: auto; font-size: 16px; background: none; border: none; color: #0a84ff; cursor: pointer;">‹ Zurück</button>
            <h2 class="overlay-title" data-i18n="ACCOUNT_TITLE" style="font-size: 20px; font-weight: 700; text-align: center; margin: 0; color: #fff; flex-grow: 1;">Konto</h2>
            <div style="width: 60px;"></div>
        </div>

        <div class="overlay-body" style="padding: 20px; color: #fff;">
            <div id="authSection">
                <h3 data-i18n="AUTH_HEADING" style="margin-top: 0; font-size: 18px;">Anmelden oder Registrieren</h3>

                <button id="googleLoginBtn" type="button" style="width: 100%; padding: 12px; background-color: #ffffff; color: #000000; border: none; border-radius: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; cursor: pointer;">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" height="18" alt="Google">
                    <span data-i18n="LOGIN_WITH_GOOGLE">Mit Google anmelden</span>
                </button>

                <div data-i18n="OR_EMAIL" style="text-align: center; margin-bottom: 15px; color: #8e8e93; font-size: 14px;">oder per E-Mail</div>

                <form id="authForm" style="display: flex; flex-direction: column; gap: 12px;">
                    <input type="email" id="authEmail" placeholder="E-Mail Adresse" data-i18n-placeholder="EMAIL_PLACEHOLDER" required style="padding: 12px; border-radius: 8px; border: 1px solid #2c2c2e; background: #1c1c1e; color: #fff; font-size: 16px;">
                    <input type="password" id="authPassword" placeholder="Passwort" data-i18n-placeholder="PASSWORD_PLACEHOLDER" required style="padding: 12px; border-radius: 8px; border: 1px solid #2c2c2e; background: #1c1c1e; color: #fff; font-size: 16px;">
                    
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button type="submit" name="action" value="login" data-i18n="BTN_LOGIN" style="flex: 1; padding: 12px; background-color: #34c759; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Anmelden</button>
                        <button type="submit" name="action" value="register" data-i18n="BTN_REGISTER" style="flex: 1; padding: 12px; background-color: #0a84ff; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Registrieren</button>
                    </div>
                </form>
            </div>

            <div id="userSection" style="display: none; text-align: center;">
                <p data-i18n="LOGGED_IN_AS" style="color: #8e8e93; margin-bottom: 5px;">Eingeloggt als:</p>
                <p id="userEmailDisplay" style="font-size: 18px; font-weight: bold; color: #34c759; margin-top: 0;"></p>
                <button id="logoutBtn" data-i18n="BTN_LOGOUT" style="width: 100%; padding: 12px; background-color: #ff453a; color: #fff; border: none; border-radius: 8px; font-weight: 600; margin-top: 20px; cursor: pointer;">Abmelden</button>
            </div>
        </div>
    </div>

    <div id="languageOverlayModal" class="full-overlay hidden" style="background-color: #121214 !important; backdrop-filter: none !important;">
        <div class="overlay-header" style="display: flex; align-items: center; justify-content: space-between; position: relative;">
            <button id="backFromLanguagesBtn" class="overlay-back-btn" style="width: auto; font-size: 16px;">‹ Zurück</button>
            <h2 class="overlay-title" data-i18n="CHANGE_LANGUAGE" style="font-size: 22px; font-weight: 700; text-align: center; margin: 0; flex-grow: 1;">Sprache wählen</h2>
            <div style="width: 60px;"></div>
        </div>

        <div class="overlay-body">
            <div class="option-list">
                <button class="select-option-btn lang-option-btn active" data-lang="de" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>Deutsch</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn lang-option-btn" data-lang="en" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>English</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn lang-option-btn" data-lang="es" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>Español</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn lang-option-btn" data-lang="fr" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>Français</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn lang-option-btn" data-lang="it" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>Italiano</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn lang-option-btn" data-lang="nl" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>Nederlands</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn lang-option-btn" data-lang="pl" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>Polski</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn lang-option-btn" data-lang="pt" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>Português</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn lang-option-btn" data-lang="ru" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>Русский</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn lang-option-btn" data-lang="tr" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span>Türkçe</span>
                    <span class="check-icon">✓</span>
                </button>
            </div>
        </div>
    </div>

    <div id="themeOverlayModal" class="full-overlay hidden" style="background-color: #121214 !important; backdrop-filter: none !important;">
        <div class="overlay-header" style="display: flex; align-items: center; justify-content: space-between; position: relative;">
            <button id="backFromThemesBtn" class="overlay-back-btn" style="width: auto; font-size: 16px;">‹ Zurück</button>
            <h2 class="overlay-title" data-i18n="APP_DESIGN" style="font-size: 22px; font-weight: 700; text-align: center; margin: 0; flex-grow: 1;">App Design</h2>
            <div style="width: 60px;"></div>
        </div>

        <div class="overlay-body">
            <div class="option-list">
                <button class="select-option-btn theme-option-btn active" data-theme="neutral" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_NEUTRAL">Standard (Neutral)</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="midnight" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_MIDNIGHT">Mitternacht</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="sunny" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_SUNNY">Sonnig</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="cyberpunk" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_CYBERPUNK">Cyberpunk</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="aurora" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_AURORA">Polarlicht</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="sakura" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_SAKURA">Kirschblüte</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="galaxy" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_GALAXY">Galaxie</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="lava" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_LAVA">Lava</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="forest" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_FOREST">Zauberwald</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="winter" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_WINTER">Winter</span>
                    <span class="check-icon">✓</span>
                </button>
                <button class="select-option-btn theme-option-btn" data-theme="royal" style="background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff;">
                    <span data-i18n="THEME_ROYAL">Königreich</span>
                    <span class="check-icon">✓</span>
                </button>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-javascript@2"></script>

    <script src="js/config.js" defer></script>
    <script src="js/eventBus.js" defer></script>
    <script src="js/storageManager.js" defer></script>
    <script src="js/languageManager.js" defer></script>
    <script src="js/themeManager.js" defer></script>
    <script src="js/installManager.js" defer></script>
    <script src="js/navigationManager.js" defer></script>
    <script src="js/onboardingManager.js" defer></script>
    <script src="js/searchManager.js" defer></script>
    <script src="js/gameManager.js" defer></script>
    <script src="js/accountManager.js" defer></script>
    <script src="js/apiManager.js" defer></script>
    <script src="js/updateManager.js" defer></script>
    <script src="js/app.js" defer></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btn = document.getElementById("installButton");
            if (btn) {
                btn.addEventListener("click", () => {
                    if (typeof InstallManager !== "undefined" && InstallManager.deferredPrompt) {
                        InstallManager.deferredPrompt.prompt();
                    } else {
                        alert(
                            "Um die App zu installieren:\n\n" +
                            "• iPhone/Safari: Tippe unten auf 'Teilen' (Quadrat mit Pfeil) ➔ 'Zum Home-Bildschirm'.\n" +
                            "• Android/Chrome: Tippe oben rechts auf die 3 Punkte ➔ 'App installieren'."
                        );
                    }
                });
            }
        });
    </script>

</body>

</html>
